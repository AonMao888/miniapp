<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multilingual TTS with MP3 Download</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
        }

        h1 { margin: 0 0 10px 0; font-size: 24px; color: #1e293b; }
        p { color: #64748b; margin-bottom: 20px; }

        textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            min-height: 150px;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
        }

        textarea:focus { border-color: #4f46e5; }

        .grid-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #334155; margin-bottom: 8px; }

        select, .radio-group {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            box-sizing: border-box;
        }

        .radio-group { display: flex; gap: 10px; font-size: 12px; align-items: center; }

        .flex-btns { display: flex; gap: 10px; }

        button, .btn-link {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        #speakBtn { background-color: #4f46e5; color: white; }
        #speakBtn:hover { background-color: #4338ca; }

        #downloadLink { background-color: #16a34a; color: white; display: none; }
        #downloadLink:hover { background-color: #15803d; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Multilingual TTS</h1>
        <p>စာသားကို ရိုက်ထည့်ပြီး အသံထွက်စေရန် Speak ကိုနှိပ်ပါ။</p>
        
        <textarea id="textInput" placeholder="Enter text here..."></textarea>

        <div class="grid-controls">
            <div class="control-group">
                <label>Language</label>
                <select id="langSelect"></select>
            </div>

            <div class="control-group">
                <label>Gender</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="all" checked> All</label>
                    <label><input type="radio" name="gender" value="male"> M</label>
                    <label><input type="radio" name="gender" value="female"> F</label>
                </div>
            </div>
            
            <div class="control-group">
                <label>Speed</label>
                <div class="radio-group">
                    <label><input type="radio" name="speed" value="0.75"> Slow</label>
                    <label><input type="radio" name="speed" value="1" checked> Nml</label>
                    <label><input type="radio" name="speed" value="1.5"> Fst</label>
                </div>
            </div>
        </div>

        <div class="control-group">
            <label>Voice Selection</label>
            <select id="voiceSelect"></select>
        </div>

        <div class="flex-btns">
            <button id="speakBtn">Speak</button>
            <a id="downloadLink" class="btn-link">Download MP3</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const voiceSelect = document.getElementById('voiceSelect');
            const langSelect = document.getElementById('langSelect');
            const textInput = document.getElementById('textInput');
            const speakBtn = document.getElementById('speakBtn');
            const downloadLink = document.getElementById('downloadLink');

            langSelect.innerHTML = `<option value="en">English</option><option value="zh">Chinese</option>`;

            let voices = [];
            
            function populateVoices() {
                const allVoices = window.speechSynthesis.getVoices();
                const selectedLang = langSelect.value;
                const selectedGender = document.querySelector('input[name="gender"]:checked').value;
                
                voices = allVoices.filter(v => {
                    const isLangMatch = v.lang.toLowerCase().includes(selectedLang.toLowerCase());
                    if (!isLangMatch) return false;

                    if (selectedGender === 'all') return true;
                    const name = v.name.toLowerCase();
                    const isFemale = name.includes('female') || name.includes('zira') || name.includes('samantha') || name.includes('victoria');
                    const isMale = !isFemale && (name.includes('male') || name.includes('david') || name.includes('mark') || name.includes('google uk english'));
                    
                    if (selectedGender === 'male') return isMale;
                    if (selectedGender === 'female') return isFemale;
                    return true;
                });
                
                voiceSelect.innerHTML = voices.length > 0 ? voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('') : '<option>No voices found</option>';
            }
            
            speechSynthesis.onvoiceschanged = populateVoices;
            populateVoices();

            // Event listeners
            langSelect.addEventListener('change', populateVoices);
            document.querySelectorAll('input[name="gender"]').forEach(el => el.addEventListener('change', populateVoices));

            speakBtn.addEventListener('click', async () => {
                const text = textInput.value;
                if (!text) return;

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const recorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                let chunks = [];

                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'audio/mpeg' });
                    downloadLink.href = URL.createObjectURL(blob);
                    downloadLink.download = 'speech.mp3';
                    downloadLink.style.display = 'block';
                    stream.getTracks().forEach(t => t.stop());
                };

                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                if(voices[voiceSelect.value]) utterance.voice = voices[voiceSelect.value];
                utterance.rate = document.querySelector('input[name="speed"]:checked').value;

                recorder.start();
                utterance.onend = () => recorder.stop();
                window.speechSynthesis.speak(utterance);
            });
        });
    </script>
</body>
</html>
